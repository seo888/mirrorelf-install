# MirrorElf Hub 部署（拉取 Docker Hub 镜像，不在本机构建）
#
#   cp env.hub.example env.hub
#   docker compose -f compose.hub.yml --env-file env.hub up -d
#
# 一键安装：bash install.sh 或见 README
# 若改 compose，请同步修改 install.sh 中的内嵌段落。
#
# Watchtower：install.sh 安装时询问，默认安装；手动启用：
#   docker compose -f compose.hub.yml --env-file env.hub --profile watchtower up -d
#
# app 使用 host 网络以便多 IP 出站；进程直接监听宿主机 16888（非 18888）。
# 管理后台：http://<服务器IP>:16888/_/admin/  默认 admin / admin

services:
  postgres:
    image: postgres:16-bookworm
    shm_size: 256mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mirrorelf
      POSTGRES_DB: mirror
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - mirrorelf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mirror']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    image: ${MIRRORELF_IMAGE}
    network_mode: host
    environment:
      MIRRORELF_SYNC_RELEASES_MANIFEST: '1'
      MIRRORELF_HOST_NETWORK: '1'
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mirrorelf_config:/app/config
      - mirrorelf_log:/app/log
      - mirrorelf_data:/app/data

  watchtower:
    profiles: [watchtower]
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_POLL_INTERVAL: '600'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      TZ: Asia/Shanghai

volumes:
  mirrorelf_pgdata:
  mirrorelf_config:
  mirrorelf_log:
  mirrorelf_data:
