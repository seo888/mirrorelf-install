# 从 Docker Hub 拉镜像运行（唯一 compose；不在本机构建）。
# 在仓库根目录：
#   docker compose up -d
# 或在 docker/ 目录：
#   docker compose -f compose.hub.yml --env-file env.hub up -d
#
# Linux 一键安装：bash docker/install.sh
# 若改端口/卷名等，请同步修改 docker/install.sh 中的内嵌段落。
#
# Watchtower：install.sh 安装时询问，默认安装；手动启用：
#   docker compose -f compose.hub.yml --env-file env.hub --profile watchtower up -d
#
# app 使用 host 网络以便多 IP 出站；进程直接监听宿主机 16888（非 18888）。
# 管理后台：http://<服务器IP>:16888/_/admin/  默认 admin / admin
#
# 数据目录绑定到宿主机（相对本 compose 文件所在目录，install.sh 默认为 /www/mirrorelf）：
#   config/  log/  data/  doc/  templates/  pgdata/  _/static/
# 应用目录属主应为 uid 10001（install.sh 会 chown）；Permission denied 时见 README 排错。
# doc、templates 为建站文档与 HTML 模板；程序仅在文件不存在时写入内置种子，不会覆盖已有文件。
# _/static/（含 js/、images/）为用户自写静态资源，升级镜像不会覆盖；管理后台 _/admin 由 entrypoint 从镜像同步。
# 从旧版「命名卷」升级：可用 docker run --rm -v mirrorelf_config:/from -v $(pwd)/config:/to alpine cp -a /from/. /to/

services:
  postgres:
    image: postgres:16-bookworm
    shm_size: 256mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mirrorelf
      POSTGRES_DB: mirror
    ports:
      - '127.0.0.1:${MIRRORELF_PG_HOST_PORT:-5432}:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mirror']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    image: ${MIRRORELF_IMAGE}
    network_mode: host
    environment:
      MIRRORELF_SYNC_RELEASES_MANIFEST: '1'
      MIRRORELF_HOST_NETWORK: '1'
      MIRRORELF_PG_HOST_PORT: ${MIRRORELF_PG_HOST_PORT:-5432}
      MIRRORELF_PG_PASSWORD: ${MIRRORELF_PG_PASSWORD:-mirrorelf}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./log:/app/log
      - ./data:/app/data
      - ./doc:/app/doc
      - ./templates:/app/templates
      - ./_static:/app/_/static

  watchtower:
    profiles: [watchtower]
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_POLL_INTERVAL: '600'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      TZ: Asia/Shanghai
